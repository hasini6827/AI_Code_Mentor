<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Code Mentor</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Dark sky background */

body {
    height: 100vh;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Static stars */

.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    z-index: -2;
}

/* Shooting stars container */

.shooting-stars {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Shooting star */

.shooting-stars span {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(-45deg, white, transparent);
    animation: shoot 5s linear infinite;
}

/* Animation */

@keyframes shoot {
    0% {
        transform: translate(0, 0) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translate(-1000px, 1000px) rotate(45deg);
        opacity: 0;
    }
}

/* Different star positions */

.shooting-stars span:nth-child(1) {
    top: 10%;
    left: 80%;
    animation-delay: 0s;
}

.shooting-stars span:nth-child(2) {
    top: 30%;
    left: 60%;
    animation-delay: 2s;
}

.shooting-stars span:nth-child(3) {
    top: 50%;
    left: 90%;
    animation-delay: 4s;
}

.shooting-stars span:nth-child(4) {
    top: 70%;
    left: 70%;
    animation-delay: 1s;
}

/* Container */

.container {
    width: 900px;
    height: 600px;
    background: rgba(255, 255, 255, 0.95);
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
}

/* Form */

.form-section {
    width: 50%;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.form-section h2 {
    margin-bottom: 30px;
    color: #333;
}

form {
    display: flex;
    flex-direction: column;
}

input {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    padding: 12px;
    background:#0f172a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    background:#333;
}

a {
    color:#0f172a;
    text-decoration: none;
}

p {
    margin-top: 10px;
}

/* Image section */

.image-section {
    width: 50%;
    position: relative;
    overflow: hidden;
}

.image-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
    </style>
</head>
<body>
<div class="stars"></div>
<div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>
<div class="container">
    <div class="form-section">
        <h2>Welcome Back </h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p>New user? <a href="/signup">Signup here</a></p>
    </div>
    <div class="image-section">
    <img src="{{ url_for('static', filename='robot.gif') }}" width="300">
    </div>

</div>

</body>
</html>
